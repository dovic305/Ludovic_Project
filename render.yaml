services:
  # Backend API Service
  - type: web
    name: healthsphere-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: healthsphere-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: healthsphere-ui
    runtime: static
    rootDir: healthsphere
    buildCommand: npm install && npm run build
    publishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: healthsphere-db
    plan: free
    databaseName: healthsphere
    user: admin
